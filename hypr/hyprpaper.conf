# https://wiki.hypr.land/Hypr-Ecosystem/hyprpaper/
wallpaper{ # LEFT MONITOR
  monitor = DP-1
  path = ~/Pictures/Wallpapers/cabin-left.png
  fit_mode = cover # Determines how to display the image. Optional and defaults to `cover`. contain|cover|tile|fill
}
wallpaper{ # RIGHT MONITOR
  monitor = HDMI-A-1
  path = ~/Pictures/Wallpapers/cabin-right.png
  fit_mode = cover # Determines how to display the image. Optional and defaults to `cover`. contain|cover|tile|fill
}
splash = false

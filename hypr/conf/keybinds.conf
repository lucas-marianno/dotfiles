###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# See https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod SHIFT, RETURN, exec, [float] $terminal
bind = $mainMod, e, exec, $fileManager
bind = $mainMod, d, exec, pkill $menu || $menuShow
bind = $mainMod, b, exec, $webBrowser
bind = $mainMod SHIFT, q, killactive,
bind = $mainMod, m, exit,
bind = $mainMod, c, centerWindow,
bind = $mainMod, w, fullscreen, 

# when a window enters floating mode, resize and center it
bind = $mainMod, f, togglefloating,
bind = $mainMod, f, resizeactive, exact 80% 75%
bind = $mainMod, f, centerWindow,

# Switch focus from current to previously focused window
bind = $mainMod, TAB, focuscurrentorlast,

# Cycle through active worskpace's windows
bind = $mainMod SHIFT, TAB, cyclenext,
bind = $mainMod SHIFT, TAB, bringactivetotop,

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, down, movefocus, d
bind = $mainMod, up, movefocus, u
bind = $mainMod, right, movefocus, r

# Move focus with mainMod + hjkl
bind = $mainMod, h, movefocus, l
bind = $mainMod, j, movefocus, d
bind = $mainMod, k, movefocus, u
bind = $mainMod, l, movefocus, r

# Move window with mainMod + arrow keys
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, down, movewindow, d
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, right, movewindow, r

# Move window with mainMod + hjkl
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, L, movewindow, r

# Swap active workspaces
bind = $mainMod CONTROL, TAB, swapactiveworkspaces, HDMI-A-1 eDP-1

# Swap window with mainMod + hjkl
bind = $mainMod CONTROL, H, swapwindow, l
bind = $mainMod CONTROL, J, swapwindow, d
bind = $mainMod CONTROL, K, swapwindow, u
bind = $mainMod CONTROL, L, swapwindow, r

# Swap window with mainMod + arrow keys
bind = $mainMod CONTROL, left, swapwindow, l
bind = $mainMod CONTROL, down, swapwindow, d
bind = $mainMod CONTROL, up, swapwindow, u
bind = $mainMod CONTROL, right, swapwindow, r

# Resize using arrows
binde = $mainMod ALT, left, resizeactive, -10 0
binde = $mainMod ALT, down, resizeactive, 0 10
binde = $mainMod ALT, up, resizeactive, 0 -10
binde = $mainMod ALT, right, resizeactive, 10 0

# Resize using hjkl
binde = $mainMod ALT, h, resizeactive, -10 0
binde = $mainMod ALT, j, resizeactive, 0 10
binde = $mainMod ALT, k, resizeactive, 0 -10
binde = $mainMod ALT, l, resizeactive, 10 0

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Special workspace
bind = $mainMod, s, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Multimedia keys for volume
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

#  Multimedia keys for LCD brightness
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 10%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Screen Capture
bind = $mainMod, Print, exec, hyprshot -m region --clipboard-only 
bind = $mainMod SHIFT, Print, exec, hyprshot -m region -o ~/Pictures/Screenshots/

# Lock Screen
bind = $mainMod, DELETE, exec, hyprlock --immediate-render # WIN+DEL to lock screen
bindl = , switch:on:Lid Switch, exec, hyprlock --immediate-render # Lock lid on close
bindl = , switch:off:Lid Switch, exec, hyprlock --immediate-render # Lock on lid open
bindl = , switch:on:Lid Switch, exec, hyprctl keyword monitor "eDP-1, disable"
bindl = , switch:off:Lid Switch, exec, hyprctl keyword monitor "eDP-1, enable"

# Desktop toggles
bind = $mainMod, F11, exec, pkill $statusBar || $statusBar
bind = $mainMod, F12, exec, pkill $wallpaperManager || $wallpaperManager

# Useful for thinkpad layout keyboard
bind = , Print, exec, wtype -k Menu


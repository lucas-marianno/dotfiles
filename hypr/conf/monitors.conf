################
### MONITORS ###
################

# See https://wiki.hypr.land/0.54.0/Configuring/Monitors/
# 
# To list all available monitors (active and inactive):
# `hyprctl monitors all`
#
# SYNTAX:  name, resolution, position, scale, extra-args
# monitor = HDMI-A-1, 1920x10180@120, auto-left, 1
# monitor = eDP-1, disable

monitor = eDP-1, 1366x768@60, auto-left, 1
monitor = HDMI-A-1, 1920x1080@60, auto-right, 1

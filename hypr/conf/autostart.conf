
#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# Basic functionality 
exec-once = /usr/lib/pam_kwallet_init
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = /usr/bin/xdg-desktop-portal-hyprland

exec-once = $notificationDaemon 
exec-once = $autoMount
exec-once = $networkManager --indicator

# Style
exec-once = $statusBar & $wallpaperManager
exec-once = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"

# Authentication
exec-once = systemctl --user import-environment PATH
exec-once = dbus-update-activation-environment --systemd --all

exec-once = source ../kde-session-env.sh

# Security
exec-once = hypridle
